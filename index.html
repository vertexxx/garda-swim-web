<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garda Swim Progress</title>
  <style>
    :root {
      --text: #0c1a2e;
      --muted: #64748b;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --accent-glow: rgba(14, 165, 233, 0.18);
      --success: #10b981;
      --danger: #ef4444;
      --line: #e2e8f0;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow-md: 0 4px 20px rgba(12, 26, 46, 0.09), 0 1px 4px rgba(12, 26, 46, 0.05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(150deg, #dbeafe 0%, #ede9fe 60%, #f0fdf4 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 28px 14px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(226, 232, 240, 0.7);
    }

    /* ── Hero card ── */
    .card-hero {
      background: linear-gradient(145deg, #0f172a 0%, #0c2d5e 55%, #1e1b4b 100%);
      color: #fff;
      border: none;
      box-shadow: 0 8px 32px rgba(12, 26, 46, 0.22), 0 0 0 1px rgba(14, 165, 233, 0.12);
      padding: 28px 24px 24px;
    }

    .page-title {
      text-align: center;
    }

    .page-title h1 {
      margin: 0 0 5px;
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .page-title p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .hero-headline {
      text-align: center;
      margin-bottom: 20px;
    }

    .hero-headline h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.01em;
    }

    /* ── Progress bar ── */
    .progress-container {
      position: relative;
      padding-top: 52px;
      padding-bottom: 38px;
    }

    .wave-track {
      position: relative;
      height: 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .wave-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      max-width: 100%;
      border-radius: 5px;
      transition: width 0.55s cubic-bezier(.4, 0, .2, 1);
      background: linear-gradient(90deg, #0ea5e9 0%, #38bdf8 65%, #7dd3fc 100%);
      overflow: hidden;
    }

    .wave-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.38) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .swimmer {
      position: absolute;
      top: 30px;
      transform: translateX(-50%) scaleX(-1);
      transition: left 0.55s cubic-bezier(.4, 0, .2, 1);
      font-size: 1.35rem;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.45));
      user-select: none;
      line-height: 1;
      z-index: 3;
    }

    .swimmer-name-box {
      position: absolute;
      top: 4px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.68rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      transition: left 0.55s cubic-bezier(.4, 0, .2, 1);
      z-index: 3;
      pointer-events: none;
    }

    .start-flag {
      position: absolute;
      left: 0; top: 20px;
      width: 16px; height: 34px;
      pointer-events: none;
      z-index: 2;
    }

    .flag-pole {
      position: absolute;
      left: 0; top: 0;
      width: 2px; height: 34px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 1px;
    }

    .flag-banner {
      position: absolute;
      left: 2px; top: 0;
      width: 12px; height: 8px;
      background: var(--success);
      border-radius: 0 3px 3px 0;
    }

    .target-marker {
      position: absolute;
      left: 88%;
      top: 57px;
      transform: translate(-50%, -50%);
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.22);
      z-index: 2;
      pointer-events: none;
    }

    .target-tooltip-box {
      position: absolute;
      left: 88%;
      top: 66px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.67rem;
      color: rgba(255, 255, 255, 0.75);
      white-space: nowrap;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 6px;
    }

    .stat {
      text-align: center;
      padding: 12px 6px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-label {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-highlight {
      background: rgba(14, 165, 233, 0.18);
      border-color: rgba(14, 165, 233, 0.28);
    }

    .stat-highlight .stat-value { color: #7dd3fc; }

    /* ── Facts row ── */
    .facts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      justify-content: center;
    }

    .fact {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ── Achievements card ── */
    .card-targets h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .target-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-size: 0.87rem;
    }

    .target-row:last-child { border-bottom: none; }

    .target-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--line);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      transition: background 0.2s, border-color 0.2s;
    }

    .target-check.done {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .target-name { flex: 1; color: var(--text); font-weight: 500; }
    .target-dist { color: var(--muted); font-size: 0.8rem; }

    /* ── Entries card ── */
    .card-entries h2 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .field { display: grid; gap: 5px; }

    label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    input {
      font: inherit;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--line);
      padding: 9px 11px;
      background: #fff;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[readonly] {
      background: #f8fafc;
      color: var(--muted);
    }

    button {
      font: inherit;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.86rem;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent-dark);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      box-shadow: 0 2px 10px rgba(14, 165, 233, 0.38);
    }

    .btn-danger {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
      padding: 7px 10px;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: #fee2e2; }

    .entries-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 16px;
      border-top: 1.5px solid var(--line);
    }

    .entries-list { margin-top: 10px; }

    .entry {
      display: grid;
      grid-template-columns: 1fr 90px auto auto;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .entry .distance {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: right;
      padding-right: 2px;
    }

    .empty-entries {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .wrap { padding: 14px 10px 36px; gap: 10px; }
      .card { padding: 18px 16px; }
      .card-hero { padding: 22px 16px 18px; }
      .page-title h1 { font-size: 1.55rem; }
      .hero-headline h2 { font-size: 0.92rem; }
      .stats-row { gap: 7px; }
      .stat { padding: 10px 4px; }
      .stat-value { font-size: 0.85rem; }
      .stat-label { font-size: 0.58rem; }
      .settings-grid { grid-template-columns: 1fr 1fr; }
      .settings-grid .field:last-child { grid-column: 1 / -1; }
      .entry { grid-template-columns: 1fr 80px auto; }
      .entry .distance { display: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">

    <!-- Page title (above dark card) -->
    <div class="page-title">
      <h1>Garda Swim 🌊</h1>
      <p>Track your training across Lake Garda</p>
    </div>

    <!-- Section 1: Hero — progress bar + stats -->
    <section class="card card-hero">
      <div class="hero-headline">
        <h2 id="heroHeadline">Swimmer's swimming progress:</h2>
      </div>

      <div class="progress-container">
        <div class="wave-track" id="waveTrack">
          <div class="wave-fill" id="waveFill"></div>
        </div>
        <div class="start-flag" aria-hidden="true">
          <div class="flag-pole"></div>
          <div class="flag-banner"></div>
        </div>
        <div class="swimmer-name-box" id="swimmerNameBox">Swimmer</div>
        <div class="swimmer" id="swimmer" aria-hidden="true">🏊</div>
        <div class="target-marker" id="targetMarker" aria-hidden="true"></div>
        <div class="target-tooltip-box" id="targetTooltipBox">Malcesine E to W — 3200m</div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-value" id="summaryDistance">0m</div>
          <div class="stat-label">Total swum</div>
        </div>
        <div class="stat stat-highlight">
          <div class="stat-value" id="lastAchievementEl">—</div>
          <div class="stat-label">Last achievement</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="nextTargetEl">Malcesine</div>
          <div class="stat-label">Next target</div>
        </div>
      </div>

      <div class="facts-row">
        <div class="fact">📅 <span id="sessionsEl">0 sessions</span></div>
        <div class="fact">📏 <span id="avgEl">0m avg</span></div>
        <div class="fact">🎯 <span id="toNextEl">3,200m to go</span></div>
      </div>
    </section>

    <!-- Section 2: Achievements -->
    <section class="card card-targets">
      <h2>Achievements</h2>
      <div id="targetsList"></div>
    </section>

    <!-- Section 3: Settings & sessions -->
    <section class="card card-entries">
      <div class="settings-grid">
        <div class="field">
          <label for="userName">Name</label>
          <input id="userName" type="text" placeholder="Your name" />
        </div>
        <div class="field">
          <label for="poolLength">Pool length (m)</label>
          <input id="poolLength" type="number" min="1" step="1" placeholder="25" />
        </div>
        <div class="field">
          <label>Round length</label>
          <input id="roundLength" type="text" readonly value="0m" />
        </div>
      </div>

      <div class="entries-header">
        <h2>Sessions</h2>
        <button id="addEntryBtn" type="button" class="btn-primary">+ Add session</button>
      </div>
      <div class="entries-list" id="entriesList"></div>
    </section>

  </main>

  <script>
    const STORAGE_KEY = 'garda-swim-progress-v1';
    const TARGETS = [
      { name: 'Malcesine E to W', distance: 3200 },
      { name: 'Rocca E to W', distance: 8000 },
      { name: 'Rocca to Bardoliino', distance: 10000 },
      { name: 'Southern widht', distance: 17200 },
      { name: 'Length N to S', distance: 51900 }
    ];

    let state = {
      name: '',
      poolLength: 25,
      entries: []
    };

    const refs = {
      userName: document.getElementById('userName'),
      poolLength: document.getElementById('poolLength'),
      roundLength: document.getElementById('roundLength'),
      entriesList: document.getElementById('entriesList'),
      addEntryBtn: document.getElementById('addEntryBtn'),
      waveFill: document.getElementById('waveFill'),
      waveTrack: document.getElementById('waveTrack'),
      swimmer: document.getElementById('swimmer'),
      swimmerNameBox: document.getElementById('swimmerNameBox'),
      targetTooltipBox: document.getElementById('targetTooltipBox'),
      summaryDistance: document.getElementById('summaryDistance'),
      heroHeadline: document.getElementById('heroHeadline'),
      lastAchievementEl: document.getElementById('lastAchievementEl'),
      nextTargetEl: document.getElementById('nextTargetEl'),
      sessionsEl: document.getElementById('sessionsEl'),
      avgEl: document.getElementById('avgEl'),
      toNextEl: document.getElementById('toNextEl'),
      targetsList: document.getElementById('targetsList')
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return;
        state.name = typeof parsed.name === 'string' ? parsed.name : '';
        state.poolLength = Number.isFinite(Number(parsed.poolLength)) ? Math.max(1, Number(parsed.poolLength)) : 25;
        state.entries = Array.isArray(parsed.entries)
          ? parsed.entries
              .map(e => ({
                id: e.id || String(Date.now() + Math.random()),
                date: typeof e.date === 'string' ? e.date : '',
                rounds: Number.isFinite(Number(e.rounds)) ? Math.max(0, Number(e.rounds)) : 0
              }))
          : [];
      } catch (_) {}
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function roundLength() {
      return Math.max(1, Number(state.poolLength) || 1) * 2;
    }

    function entryDistance(rounds) {
      return Math.max(0, Number(rounds) || 0) * roundLength();
    }

    function totalDistance() {
      return state.entries.reduce((sum, e) => sum + entryDistance(e.rounds), 0);
    }

    function fmtMeters(m) {
      return `${Math.round(m)}m`;
    }

    function cumulativeTargets() {
      let sum = 0;
      return TARGETS.map(t => {
        sum += t.distance;
        return { ...t, cumulative: sum };
      });
    }

    function updateSummary() {
      const total = totalDistance();
      const all = cumulativeTargets();
      const name = state.name.trim() || 'Swimmer';

      refs.summaryDistance.textContent = fmtMeters(total);
      refs.swimmerNameBox.textContent = name;
      refs.roundLength.value = fmtMeters(roundLength());
      refs.heroHeadline.textContent = `${name}'s swimming progress:`;

      // Last achieved target
      let lastAchieved = null;
      for (const t of all) {
        if (total >= t.cumulative) lastAchieved = t;
      }
      refs.lastAchievementEl.textContent = lastAchieved ? lastAchieved.name : '—';

      // Next target
      const next = all.find(t => total < t.cumulative);
      refs.nextTargetEl.textContent = next ? next.name : '✓ All done!';

      // Facts
      const sessions = state.entries.length;
      refs.sessionsEl.textContent = `${sessions} session${sessions !== 1 ? 's' : ''}`;

      const avg = sessions > 0 ? Math.round(total / sessions) : 0;
      refs.avgEl.textContent = `${fmtMeters(avg)} avg`;

      const toNext = next ? Math.max(0, next.cumulative - total) : 0;
      refs.toNextEl.textContent = next ? `${fmtMeters(toNext)} to go` : 'All done!';
    }

    function createMarker(posPct, cls, label) {
      const marker = document.createElement('div');
      marker.className = `marker ${cls}`;
      marker.style.left = `${posPct}%`;
      marker.title = label;
      refs.waveTrack.appendChild(marker);
    }

    function clearMarkers() {
      refs.waveTrack.querySelectorAll('.marker').forEach(el => el.remove());
    }

    function updateProgressBar() {
      clearMarkers();
      const SCALE = 0.88; // target marker sits at 88% of bar; 12% gray buffer remains
      const all = cumulativeTargets();
      const total = totalDistance();

      let lastAchievedIndex = -1;
      for (let i = 0; i < all.length; i++) {
        if (total >= all[i].cumulative) lastAchievedIndex = i;
      }

      const segmentStartIndex = lastAchievedIndex;
      const segmentEndIndex = Math.min(all.length - 1, segmentStartIndex + 1);
      const startDist = segmentStartIndex < 0 ? 0 : all[segmentStartIndex].cumulative;
      const endName = all[segmentEndIndex].name;
      const endDist = all[segmentEndIndex].cumulative;
      const segmentLength = Math.max(1, endDist - startDist);
      const inSegment = Math.max(0, total - startDist);
      const segmentPct = Math.min(100, (inSegment / segmentLength) * 100);

      const fillPct = segmentPct * SCALE;
      refs.waveFill.style.width = `${fillPct}%`;

      const swimPos = Math.max(1, Math.min(SCALE * 100 - 1, fillPct));
      refs.swimmer.style.left = `${swimPos}%`;
      refs.swimmerNameBox.style.left = `${swimPos}%`;
      refs.swimmerNameBox.textContent = state.name.trim() || 'Swimmer';

      refs.targetTooltipBox.textContent = `${endName} \u2014 ${fmtMeters(endDist)}`;
    }

    function renderTargets() {
      refs.targetsList.innerHTML = '';
      const total = totalDistance();
      const all = cumulativeTargets();
      all.forEach(t => {
        const done = total >= t.cumulative;
        const row = document.createElement('div');
        row.className = 'target-row';
        row.innerHTML = `
          <div class="target-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
          <span class="target-name">${t.name}</span>
          <span class="target-dist">${fmtMeters(t.cumulative)}</span>`;
        refs.targetsList.appendChild(row);
      });
    }

    function onEntryChange(id, field, value) {
      const entry = state.entries.find(e => e.id === id);
      if (!entry) return;
      if (field === 'rounds') {
        entry.rounds = Math.max(0, Number(value) || 0);
      } else {
        entry[field] = value;
      }
      saveState();
      renderEntries();
      updateSummary();
      updateProgressBar();
      renderTargets();
    }

    function removeEntry(id) {
      state.entries = state.entries.filter(e => e.id !== id);
      saveState();
      renderEntries();
      updateSummary();
      updateProgressBar();
      renderTargets();
    }

    function renderEntries() {
      refs.entriesList.innerHTML = '';
      if (!state.entries.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-entries';
        empty.textContent = 'No sessions yet. Add your first swim day.';
        refs.entriesList.appendChild(empty);
        return;
      }

      state.entries
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''))
        .forEach(entry => {
          const row = document.createElement('div');
          row.className = 'entry';

          const date = document.createElement('input');
          date.type = 'date';
          date.value = entry.date;
          date.addEventListener('change', e => onEntryChange(entry.id, 'date', e.target.value));

          const rounds = document.createElement('input');
          rounds.type = 'number';
          rounds.min = '0';
          rounds.step = '1';
          rounds.value = String(entry.rounds);
          rounds.addEventListener('input', e => onEntryChange(entry.id, 'rounds', e.target.value));

          const distance = document.createElement('div');
          distance.className = 'distance';
          distance.textContent = fmtMeters(entryDistance(entry.rounds));

          const del = document.createElement('button');
          del.type = 'button';
          del.className = 'btn-danger';
          del.textContent = '✕';
          del.title = 'Delete session';
          del.addEventListener('click', () => removeEntry(entry.id));

          row.append(date, rounds, distance, del);
          refs.entriesList.appendChild(row);
        });
    }

    function addEntry() {
      state.entries.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        date: new Date().toISOString().slice(0, 10),
        rounds: 1
      });
      saveState();
      renderEntries();
      updateSummary();
      updateProgressBar();
      renderTargets();
    }

    function bindInputs() {
      refs.userName.value = state.name;
      refs.poolLength.value = String(state.poolLength);

      refs.userName.addEventListener('input', e => {
        state.name = e.target.value;
        saveState();
        updateSummary();
        updateProgressBar();
      });

      refs.poolLength.addEventListener('input', e => {
        state.poolLength = Math.max(1, Number(e.target.value) || 1);
        saveState();
        renderEntries();
        updateSummary();
        updateProgressBar();
        renderTargets();
      });

      refs.addEntryBtn.addEventListener('click', addEntry);
    }

    function init() {
      loadState();
      bindInputs();
      renderTargets();
      renderEntries();
      updateSummary();
      updateProgressBar();
    }

    init();
  </script>
</body>
</html>
